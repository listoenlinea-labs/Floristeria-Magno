<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resultado del pago de Floristería Juan H Magno.">
  <title>Resultado del pago | Juan H Magno</title>

  <link rel="icon" href="assets/img/icon/fav-mago-2.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/mobile-nav.css">

  <style>
    .payment-result-page {
      min-height: 100vh;
      padding: 150px 0 90px;
      display: grid;
      place-items: center;
    }

    .payment-result-card {
      width: min(680px, 100%);
      padding: clamp(2rem, 5vw, 4rem);
      text-align: center;
    }

    .payment-result-icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 2.4rem;
      background: rgba(255, 255, 255, 0.1);
    }

    .payment-result-card[data-status="approved"] .payment-result-icon {
      color: #b7f7ca;
      background: rgba(60, 190, 100, 0.16);
    }

    .payment-result-card[data-status="pending"] .payment-result-icon {
      color: #ffe29a;
      background: rgba(255, 195, 62, 0.14);
    }

    .payment-result-card[data-status="rejected"] .payment-result-icon,
    .payment-result-card[data-status="error"] .payment-result-icon {
      color: #ffb4b4;
      background: rgba(220, 70, 70, 0.14);
    }

    .payment-detail-list {
      margin: 2rem 0;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      text-align: left;
    }

    .payment-detail-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .payment-detail-row:last-child {
      border-bottom: 0;
    }
  </style>
</head>
<body class="page-carrito">
  <site-header></site-header>
  <div id="mobile-nav-container"></div>

  <main class="payment-result-page">
    <div class="container d-flex justify-content-center">
      <section class="glass-card payment-result-card" id="paymentResultCard" data-status="loading">
        <div class="payment-result-icon" id="paymentResultIcon">
          <span class="spinner-border" aria-hidden="true"></span>
        </div>

        <div class="eyebrow">Mercado Pago</div>
        <h1 class="serif mb-3" id="paymentResultTitle">Verificando tu pago…</h1>
        <p class="page-copy mx-auto" id="paymentResultMessage">
          Estamos consultando directamente el estado de la operación.
        </p>

        <div class="payment-detail-list" id="paymentDetails" hidden>
          <div class="payment-detail-row">
            <span>Pago</span>
            <strong id="paymentIdText">—</strong>
          </div>
          <div class="payment-detail-row">
            <span>Referencia</span>
            <strong id="paymentReferenceText">—</strong>
          </div>
          <div class="payment-detail-row">
            <span>Total</span>
            <strong id="paymentAmountText">—</strong>
          </div>
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
          <a href="catalogo.html" class="btn btn-outline-light rounded-pill px-4">Volver al catálogo</a>
          <a href="carrito.html" class="btn btn-luxury rounded-pill px-4" id="retryPaymentLink">Volver al carrito</a>
        </div>
      </section>
    </div>
  </main>

  <script>
    const CART_KEY = 'jhmagno_cart';
    const params = new URLSearchParams(window.location.search);
    const paymentId = params.get('payment_id') || params.get('collection_id');
    const returnedResult = params.get('resultado');

    const BACKEND_BASE_URL = window.location.hostname === 'localhost' ||
      window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://api.listoenlinea.host';

    const resultCard = document.getElementById('paymentResultCard');
    const resultIcon = document.getElementById('paymentResultIcon');
    const resultTitle = document.getElementById('paymentResultTitle');
    const resultMessage = document.getElementById('paymentResultMessage');
    const paymentDetails = document.getElementById('paymentDetails');
    const paymentIdText = document.getElementById('paymentIdText');
    const paymentReferenceText = document.getElementById('paymentReferenceText');
    const paymentAmountText = document.getElementById('paymentAmountText');
    const retryPaymentLink = document.getElementById('retryPaymentLink');

    function money(value, currency = 'MXN') {
      return new Intl.NumberFormat('es-MX', {
        style: 'currency',
        currency
      }).format(Number(value || 0));
    }

    function showResult(status, data = {}) {
      const normalizedStatus = status || 'error';
      resultCard.dataset.status = normalizedStatus;
      paymentDetails.hidden = !data.id;

      if (data.id) {
        paymentIdText.textContent = data.id;
        paymentReferenceText.textContent = data.externalReference || 'Sin referencia';
        paymentAmountText.textContent = money(data.transactionAmount, data.currencyId || 'MXN');
      }

      if (normalizedStatus === 'approved') {
        resultIcon.innerHTML = '<i class="bi bi-check-lg"></i>';
        resultTitle.textContent = 'Pago aprobado';
        resultMessage.textContent =
          'Tu pago fue confirmado por Mercado Pago. La florería ya puede preparar tu pedido.';
        retryPaymentLink.textContent = 'Ver carrito';
        localStorage.removeItem(CART_KEY);
        return;
      }

      if (normalizedStatus === 'pending' || normalizedStatus === 'in_process') {
        resultIcon.innerHTML = '<i class="bi bi-clock-history"></i>';
        resultTitle.textContent = 'Pago pendiente';
        resultMessage.textContent =
          'Mercado Pago todavía está procesando la operación. Conserva esta página y revisa nuevamente más tarde.';
        return;
      }

      resultIcon.innerHTML = '<i class="bi bi-x-lg"></i>';
      resultTitle.textContent = 'El pago no se completó';
      resultMessage.textContent =
        'La operación fue rechazada o cancelada. Tu carrito sigue guardado para que puedas intentar nuevamente.';
    }

    async function verifyPayment() {
      if (!paymentId) {
        showResult(returnedResult === 'pending' ? 'pending' : 'error');
        return;
      }

      try {
        const response = await fetch(
          `${BACKEND_BASE_URL}/api/mercadopago/payment/${encodeURIComponent(paymentId)}`
        );
        const result = await response.json().catch(() => ({}));

        if (!response.ok || !result.data) {
          throw new Error(result.message || 'No fue posible verificar el pago');
        }

        showResult(result.data.status, result.data);
      } catch (error) {
        console.error('Error verificando pago:', error);
        showResult(returnedResult === 'pending' ? 'pending' : 'error');
      }
    }

    verifyPayment();
  </script>
  <script type="module" src="components/site-header.js"></script>
  <script src="assets/js/mobile-nav.js"></script>
</body>
</html>
